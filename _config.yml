title: Book Hub
description: >-
  A personal book discovery and review website. Explore curated titles,
  read honest reviews, and find your next great read.
baseurl: ""
url: "https://angelnicole.github.io"

theme: jekyll-theme-cayman
remote_theme: pages-themes/cayman@v0.2.0

markdown: kramdown

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-remote-theme

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md

header_pages:
  - index.md
  - about.md
  - favorites.md
  - reviews.md
  - genres.md
  - contact.md